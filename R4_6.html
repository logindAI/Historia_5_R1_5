<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Historyczny – Polska Pierwszych Piastów</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9972a;
    --dark-gold: #9a6f1a;
    --red: #8b1a1a;
    --parchment: #f5edd6;
    --parchment2: #ede0c4;
    --dark: #1a1209;
    --correct: #2a7a3b;
    --wrong: #8b1a1a;
    --shadow: 0 4px 24px rgba(0,0,0,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, #3a1a00 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, #1a0a00 0%, transparent 60%);
  }

  header {
    width: 100%;
    text-align: center;
    padding: 36px 20px 24px;
    background: linear-gradient(180deg, #0d0800 0%, transparent 100%);
    border-bottom: 2px solid var(--gold);
    margin-bottom: 32px;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    letter-spacing: 2px;
    text-shadow: 0 2px 12px rgba(201,151,42,0.4);
  }

  header p {
    color: #c8b98a;
    margin-top: 8px;
    font-size: 1rem;
  }

  .scoreboard {
    display: flex;
    gap: 28px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .score-box {
    background: rgba(201,151,42,0.12);
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    padding: 10px 28px;
    text-align: center;
    color: var(--parchment);
    font-family: 'Cinzel', serif;
  }

  .score-box .score-num {
    font-size: 2rem;
    color: var(--gold);
    font-weight: 800;
    display: block;
  }

  .score-box .score-label {
    font-size: 0.75rem;
    letter-spacing: 1px;
    opacity: 0.75;
  }

  .quiz-container {
    width: 100%;
    max-width: 760px;
    padding: 0 16px;
  }

  .question-card {
    background: var(--parchment);
    border-radius: 14px;
    box-shadow: var(--shadow), 0 0 0 3px var(--dark-gold);
    margin-bottom: 28px;
    overflow: hidden;
    animation: fadeIn 0.4s ease;
    position: relative;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .question-header {
    background: linear-gradient(90deg, var(--red) 0%, #6b1111 100%);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .question-num {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: 0.85rem;
    font-weight: 800;
    background: rgba(0,0,0,0.3);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .question-text {
    color: #fff;
    font-weight: 700;
    font-size: 1.02rem;
    line-height: 1.4;
    flex: 1;
  }

  .options {
    padding: 16px 18px 18px;
    display: grid;
    gap: 9px;
  }

  .option-btn {
    background: var(--parchment2);
    border: 2px solid #c9a96e;
    border-radius: 8px;
    padding: 10px 16px;
    text-align: left;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-size: 0.97rem;
    color: var(--dark);
    transition: background 0.18s, border-color 0.18s, transform 0.12s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .option-btn:hover:not(:disabled) {
    background: #e8d5a3;
    border-color: var(--gold);
    transform: translateX(3px);
  }

  .option-btn:disabled { cursor: default; }

  .option-btn .opt-letter {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    color: var(--red);
    min-width: 22px;
    font-size: 1rem;
  }

  .option-btn.correct {
    background: #d4edda;
    border-color: var(--correct);
    color: #145222;
  }

  .option-btn.correct .opt-letter { color: var(--correct); }

  .option-btn.wrong {
    background: #f8d7da;
    border-color: var(--wrong);
    color: #6b1a1a;
  }

  .option-btn.wrong .opt-letter { color: var(--wrong); }

  .option-btn.reveal-correct {
    background: #d4edda;
    border-color: var(--correct);
    opacity: 0.75;
  }

  .feedback {
    margin: 0 18px 14px;
    padding: 9px 14px;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.95rem;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .feedback.show { display: flex; }

  .feedback.correct-fb {
    background: #d4edda;
    color: #145222;
    border: 1.5px solid var(--correct);
  }

  .feedback.wrong-fb {
    background: #f8d7da;
    color: #6b1a1a;
    border: 1.5px solid var(--wrong);
  }

  .feedback .fb-icon { font-size: 1.3rem; }

  .progress-bar-wrap {
    width: 100%;
    max-width: 760px;
    padding: 0 16px;
    margin-bottom: 22px;
  }

  .progress-bar-bg {
    background: #2a1a00;
    border-radius: 20px;
    height: 10px;
    overflow: hidden;
    border: 1px solid var(--gold);
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), #f0c040);
    border-radius: 20px;
    transition: width 0.4s;
    width: 0%;
  }

  .progress-label {
    color: #c8b98a;
    font-size: 0.82rem;
    margin-bottom: 5px;
    text-align: right;
  }

  .result-section {
    display: none;
    width: 100%;
    max-width: 760px;
    padding: 0 16px;
    margin-top: 10px;
  }

  .result-card {
    background: var(--parchment);
    border-radius: 16px;
    box-shadow: var(--shadow), 0 0 0 3px var(--gold);
    padding: 40px 30px;
    text-align: center;
  }

  .result-card h2 {
    font-family: 'Cinzel', serif;
    color: var(--red);
    font-size: 2rem;
    margin-bottom: 12px;
  }

  .result-score {
    font-family: 'Cinzel', serif;
    font-size: 3.5rem;
    color: var(--gold);
    font-weight: 800;
    display: block;
    margin: 10px 0;
  }

  .result-msg {
    color: #5a3a10;
    font-size: 1.1rem;
    margin: 12px 0 24px;
  }

  .restart-btn {
    background: linear-gradient(90deg, var(--red), #6b1111);
    color: var(--gold);
    border: 2px solid var(--gold);
    border-radius: 10px;
    padding: 12px 32px;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity 0.2s, transform 0.15s;
  }

  .restart-btn:hover { opacity: 0.85; transform: scale(1.04); }

  .crown { font-size: 3rem; display: block; margin-bottom: 8px; }

  @media (max-width: 500px) {
    .question-text { font-size: 0.93rem; }
    .option-btn { font-size: 0.9rem; padding: 9px 12px; }
  }
</style>
</head>

<header>

let correctCount = 0;
let wrongCount = 0;
let answered = 0;
const total = questions.length;

function buildQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = `card-${idx}`;

    const letters = ['A', 'B', 'C', 'D'];
    let optsHtml = q.opts.map((opt, oi) => `
      <button class="option-btn" onclick="answer(${idx}, ${oi})" id="opt-${idx}-${oi}">
        <span class="opt-letter">${letters[oi]}.</span> ${opt}
      </button>
    `).join('');

    card.innerHTML = `
      <div class="question-header">
        <span class="question-num">${idx + 1}</span>
        <span class="question-text">${q.q}</span>
      </div>
      <div class="options">${optsHtml}</div>
      <div class="feedback" id="fb-${idx}">
        <span class="fb-icon"></span>
        <span class="fb-text"></span>
      </div>
    `;
    container.appendChild(card);
  });
  updateProgress();
}

function answer(qIdx, optIdx) {
  const q = questions[qIdx];
  const correct = q.a;
  const buttons = document.querySelectorAll(`[id^="opt-${qIdx}-"]`);

  buttons.forEach(btn => btn.disabled = true);

  const chosen = document.getElementById(`opt-${qIdx}-${optIdx}`);
  const fb = document.getElementById(`fb-${qIdx}`);

  if (optIdx === correct) {
    chosen.classList.add('correct');
    fb.classList.add('show', 'correct-fb');
    fb.querySelector('.fb-icon').textContent = '✅';
    fb.querySelector('.fb-text').textContent = 'Świetnie! Dobra odpowiedź!';
    correctCount++;
    document.getElementById('correctCount').textContent = correctCount;
  } else {
    chosen.classList.add('wrong');
    document.getElementById(`opt-${qIdx}-${correct}`).classList.add('reveal-correct');
    fb.classList.add('show', 'wrong-fb');
    fb.querySelector('.fb-icon').textContent = '❌';
    fb.querySelector('.fb-text').textContent = `Niestety, błąd! Poprawna odpowiedź: ${['A','B','C','D'][correct]}. ${q.opts[correct]}`;
    wrongCount++;
    document.getElementById('wrongCount').textContent = wrongCount;
  }

  answered++;
  document.getElementById('totalAnswered').textContent = answered;
  updateProgress();

  if (answered === total) {
    setTimeout(showResult, 700);
  }

  // Smooth scroll to next unanswered
  setTimeout(() => {
    if (qIdx + 1 < total) {
      const nextCard = document.getElementById(`card-${qIdx + 1}`);
      if (nextCard) nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 400);
}

function updateProgress() {
  const pct = (answered / total) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${answered} / ${total} pytań`;
}

function showResult() {
  document.getElementById('resultSection').style.display = 'block';
  const pct = Math.round((correctCount / total) * 100);
  document.getElementById('finalScore').textContent = `${correctCount} / ${total} (${pct}%)`;

  let msg = '';
  if (pct >= 90) msg = '🏆 Doskonale! Jesteś mistrzem historii Polski!';
  else if (pct >= 75) msg = '🌟 Bardzo dobrze! Znasz historię Pierwszych Piastów!';
  else if (pct >= 55) msg = '👍 Nieźle! Warto jeszcze raz przejrzeć materiał.';
  else if (pct >= 40) msg = '📖 Powtórz lekcje – dasz radę następnym razem!';
  else msg = '📚 Koniecznie wróć do podręcznika i spróbuj ponownie!';

  document.getElementById('finalMsg').textContent = msg;
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function restartQuiz() {
  correctCount = 0; wrongCount = 0; answered = 0;
  document.getElementById('correctCount').textContent = 0;
  document.getElementById('wrongCount').textContent = 0;
  document.getElementById('totalAnswered').textContent = 0;
  document.getElementById('resultSection').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildQuiz();
</script>
