<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test: Średniowieczne miasto i wieś</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0f1520;
    --parchment: #f5ead8;
    --parchment-dark: #e8d5b0;
    --blue: #2a4a7a;
    --blue-light: #4a7ab0;
    --ink: #2c1810;
    --correct: #2d6e2d;
    --wrong: #8b1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'EB Garamond', serif;
    background: var(--dark);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 15% 40%, #0a1530 0%, transparent 60%),
      radial-gradient(ellipse at 85% 70%, #150a00 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9a84c' fill-opacity='0.025'%3E%3Crect x='45' y='0' width='10' height='100'/%3E%3Crect x='0' y='45' width='100' height='10'/%3E%3C/g%3E%3C/svg%3E");
  }

  .wrapper { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }

  .header { text-align: center; margin-bottom: 50px; position: relative; }
  .header::before { content: '🏙'; font-size: 1.8rem; position: absolute; left: 0; top: 50%; transform: translateY(-50%); opacity: 0.5; }
  .header::after  { content: '🌾'; font-size: 1.8rem; position: absolute; right: 0; top: 50%; transform: translateY(-50%); opacity: 0.5; }

  .icon { font-size: 3.2rem; display: block; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 4.5vw, 2.8rem);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(201,168,76,0.4), 2px 2px 0 #3a5a8a;
    letter-spacing: 0.04em;
    line-height: 1.2;
  }
  .subtitle { font-size: 1.1rem; color: var(--gold-light); opacity: 0.7; margin-top: 8px; font-style: italic; }

  .progress-bar-wrap { background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); border-radius: 4px; height: 8px; margin-bottom: 10px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--blue-light), var(--gold-light)); transition: width 0.5s ease; border-radius: 4px; }
  .progress-text { text-align: right; color: var(--gold); font-size: 0.85rem; font-family: 'Cinzel', serif; margin-bottom: 30px; }

  .question-card {
    background: linear-gradient(160deg, var(--parchment) 0%, var(--parchment-dark) 100%);
    border-radius: 4px; padding: 36px 40px 30px; margin-bottom: 28px;
    border: 1px solid rgba(201,168,76,0.5);
    box-shadow: 0 0 0 4px rgba(42,74,122,0.08), 0 8px 40px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.5);
    position: relative; animation: slideIn 0.4s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .question-card::before {
    content: ''; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(42,74,122,0.18); border-radius: 2px; pointer-events: none;
  }

  .q-category {
    display: inline-block; font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.2em; text-transform: uppercase; padding: 3px 10px;
    border-radius: 2px; margin-bottom: 12px;
    background: rgba(42,74,122,0.12); border: 1px solid rgba(42,74,122,0.3); color: #2a4a7a;
  }
  .q-number { font-family: 'Cinzel', serif; font-size: 0.75rem; color: #5a3a1a; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; }
  .q-text { font-size: 1.25rem; color: var(--ink); line-height: 1.6; font-weight: 600; margin-bottom: 26px; }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .option-btn {
    background: rgba(255,255,255,0.6); border: 2px solid rgba(201,168,76,0.35);
    border-radius: 4px; padding: 14px 18px; text-align: left; cursor: pointer;
    font-family: 'EB Garamond', serif; font-size: 1.05rem; color: var(--ink);
    transition: all 0.2s ease; display: flex; align-items: center; gap: 14px;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(42,74,122,0.1); border-color: var(--blue-light);
    transform: translateX(4px); box-shadow: -3px 0 0 var(--blue-light);
  }
  .option-letter {
    font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 700;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(201,168,76,0.2); border: 1px solid rgba(201,168,76,0.5);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--blue);
  }
  .option-btn.correct {
    background: rgba(45,110,45,0.15); border-color: var(--correct);
    box-shadow: -4px 0 0 var(--correct), 0 0 20px rgba(45,110,45,0.12);
    animation: correctPulse 0.4s ease;
  }
  @keyframes correctPulse { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
  .option-btn.correct .option-letter { background: var(--correct); color: white; border-color: var(--correct); }
  .option-btn.wrong { background: rgba(139,26,26,0.1); border-color: var(--wrong); box-shadow: -4px 0 0 var(--wrong); animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  .option-btn.wrong .option-letter { background: var(--wrong); color: white; border-color: var(--wrong); }
  .option-btn:disabled { cursor: default; }

  .feedback { display: none; margin-top: 22px; padding: 18px 22px; border-radius: 4px; font-size: 1rem; line-height: 1.75; animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(45,110,45,0.10); border: 1px solid rgba(45,110,45,0.35); border-left: 4px solid var(--correct); }
  .feedback.wrong-fb   { background: rgba(139,26,26,0.07); border: 1px solid rgba(139,26,26,0.25); border-left: 4px solid var(--wrong); }
  .feedback-header { font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .feedback.correct-fb .feedback-header { color: var(--correct); }
  .feedback.wrong-fb   .feedback-header { color: var(--wrong); }
  .feedback-body { color: var(--ink); }
  .feedback-body strong { color: var(--blue); }

  .next-btn {
    display: none; margin-top: 22px;
    background: linear-gradient(135deg, #2a4a7a 0%, #1a2a5a 100%);
    color: var(--gold-light); border: 1px solid rgba(201,168,76,0.4);
    border-radius: 4px; padding: 13px 32px;
    font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3); float: right;
  }
  .next-btn:hover { background: linear-gradient(135deg, #3a6aaa 0%, #2a4a8a 100%); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
  .next-btn.show { display: block; }
  .clearfix::after { content: ''; display: table; clear: both; }

  .score-screen {
    display: none; text-align: center;
    background: linear-gradient(160deg, var(--parchment) 0%, var(--parchment-dark) 100%);
    border-radius: 4px; padding: 60px 40px;
    border: 1px solid rgba(201,168,76,0.5);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6); animation: slideIn 0.5s ease;
  }
  .score-screen.show { display: block; }
  .score-icon { font-size: 4rem; margin-bottom: 10px; }
  .stars { font-size: 2rem; margin-bottom: 16px; letter-spacing: 4px; }
  .score-title { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--gold); text-shadow: 2px 2px 0 #3a5a8a; margin-bottom: 10px; }
  .score-num { font-family: 'Cinzel', serif; font-size: 4rem; color: var(--blue); line-height: 1; margin: 20px 0; }
  .score-msg { font-size: 1.15rem; color: var(--ink); font-style: italic; max-width: 500px; margin: 0 auto 30px; line-height: 1.7; }
  .restart-btn {
    background: linear-gradient(135deg, #2a4a7a 0%, #1a2a5a 100%);
    color: var(--gold-light); border: 1px solid rgba(201,168,76,0.4);
    border-radius: 4px; padding: 15px 40px;
    font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }

  .divider { text-align: center; color: var(--gold); font-size: 1.2rem; opacity: 0.4; margin: 6px 0 30px; letter-spacing: 0.5em; }

  @media (max-width: 600px) {
    .question-card { padding: 22px 18px 18px; }
    .header::before, .header::after { display: none; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <span class="icon">🏰</span>
    <h1>Średniowieczne miasto i wieś</h1>
    <div class="subtitle">Dział 3 — Jak powstawały miasta, kto nimi rządził i jak żyli ich mieszkańcy</div>
  </div>
  <div class="divider">✦ ✦ ✦</div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-text" id="progressText">Pytanie 1 z 30</div>

  <div id="quizArea"></div>

  <div class="score-screen" id="scoreScreen">
    <div class="score-icon" id="scoreIcon">🏆</div>
    <div class="stars" id="scoreStars"></div>
    <div class="score-title">Koniec testu!</div>
    <div class="score-num" id="scoreNum">0/30</div>
    <div class="score-msg" id="scoreMsg"></div>
    <button class="restart-btn" onclick="restart()">🏰 Zagraj ponownie</button>
  </div>
</div>

<script>
const questions = [

  // ═══════════════════════════════════════
  // BLOK 1: JAK POWSTAWAŁY MIASTA
  // ═══════════════════════════════════════
  {
    cat: "Jak powstawały miasta",
    q: "Co to był GRÓD w średniowieczu?",
    opts: [
      "Duże miasto handlowe z ratuszem",
      "Osada obronna wzniesiona w trudnym do zdobycia miejscu",
      "Klasztor otoczony murami",
      "Targowisko na skrzyżowaniu szlaków"
    ],
    answer: 1,
    explanation: "<strong>Gród</strong> to osada obronna wzniesiona w trudnym do zdobycia miejscu. W sredniowiecznej Europie, poza obszarami dawnego cesarstwa rzymskiego, budowano niewielkie grody. Z czasem przy grodach zaczely powstawac osady rzemieslnikow i kupieckie."
  },
  {
    cat: "Jak powstawały miasta",
    q: "Gdzie w sredniowieczu istnialy miasta od poczatku, a gdzie dopiero powstawaly?",
    opts: [
      "Miasta istnialy wsedzie juz od starożytnosci",
      "Miasta istnialy tylko w tej czesci Europy, ktora byla pod wladza Rzymian; na pozostalym obszarze dopiero powstawaly",
      "Miasta istnialy tylko na terenach arabskich",
      "Miasta powstawaly wylacznie przy klasztorach"
    ],
    answer: 1,
    explanation: "W sredniowiecznej Europie <strong>miasta poczatkowo istnialy tylko w tej czesci kontynentu, ktora w starozytnosci byla pod wladza Rzymian</strong>. Na pozostalym obszarze budowano niewielkie grody, przy ktorych dopiero z czasem powstawaly osady."
  },
  {
    cat: "Jak powstawały miasta",
    q: "Kim byl RZEMIEŚLNIK w średniowiecznym mieście?",
    opts: [
      "Osobą zajmującą się handlem na targowisku",
      "Osobą zajmującą się wytwarzaniem i naprawianiem przedmiotów codziennego użytku",
      "Urzędnikiem odpowiedzialnym za pobieranie podatków",
      "Żołnierzem chroniącym bramy miejskie"
    ],
    answer: 1,
    explanation: "<strong>Rzemieślnik</strong> to osoba zajmująca się wytwarzaniem i naprawianiem przedmiotów codziennego użytku. Na przykład kowale wykonywali narzędzia, a garncarze tworzyli gliniane naczynia. Rzemieślnicy sprzedawali swoje wyroby kupcom."
  },
  {
    cat: "Jak powstawały miasta",
    q: "Co to były OSADY TARGOWE i dlaczego je zakładano?",
    opts: [
      "Osady przy klasztorach, gdzie mnisi handlowali",
      "Osady zakładane na skrzyżowaniach szlaków handlowych, by ułatwić wymianę towarów",
      "Obozowiska wojskowe przy granicach państwa",
      "Miejsca, gdzie chłopi płacili daniny władcy"
    ],
    answer: 1,
    explanation: "<strong>Osady targowe</strong> zakładano na skrzyżowaniach szlaków handlowych, aby ułatwić wymianę towarów. Regularnie odbywały się w nich targi, podczas których handlowano rozmaitymi wyrobami. Od XIII wieku osady targowe i rzemieślnicze przeżywały ożywiony rozwój i przekształcały się w <strong>miasta</strong>."
  },
  {
    cat: "Jak powstawały miasta",
    q: "Co to była LOKACJA miasta lub wsi?",
    opts: [
      "Wybór miejsca na budowę zamku",
      "Założenie i prawne utworzenie miejscowości — właściciel gruntu zawierał umowę z zasadzca",
      "Pierwsza elekcja burmistrza",
      "Ceremonia nadania praw miejskich przez króla"
    ],
    answer: 1,
    explanation: "<strong>Lokacja</strong> to utworzenie miasta lub wsi. Właściciel gruntu, na którym lokowano daną miejscowość, zawierał umowę z <strong>zasadźcą</strong> zajmującym się jej zakładaniem. Najczęściej wydawał też dokument lokacyjny określający prawa i obowiązki mieszkańców."
  },
  {
    cat: "Jak powstawały miasta",
    q: "Co zawierał DOKUMENT LOKACYJNY?",
    opts: [
      "Wyłącznie nazwę nowego miasta",
      "Prawa i obowiązki mieszkańców, układ ulic i placów oraz informacje o jarmarkach",
      "Liste wszystkich mieszkańców i ich majątki",
      "Przywileje rycerskie dla założycieli"
    ],
    answer: 1,
    explanation: "Dokument lokacyjny zawierał <strong>prawa i obowiązki mieszkańców</strong> oraz wytyczne dotyczące położenia placów i przebiegu ulic, a także informacje, w jakie dni można organizować doroczne jarmarki. Pierwszych lokacji na ziemiach polskich dokonano już na początku XIII wieku."
  },
  {
    cat: "Jak powstawały miasta",
    q: "Kiedy dokonano pierwszych lokacji miast na ziemiach polskich?",
    opts: [
      "Na początku X wieku",
      "Na początku XI wieku",
      "Na początku XIII wieku",
      "Na początku XV wieku"
    ],
    answer: 2,
    explanation: "Pierwszych lokacji na ziemiach polskich dokonano już <strong>na początku XIII wieku</strong>. Dokument lokacyjny Krakowa pochodzi z 1257 roku — dzięki niemu ukształtował się Krakowski Rynek Główny."
  },

  // ═══════════════════════════════════════
  // BLOK 2: WŁADZE MIEJSKIE I SAMORZĄD
  // ═══════════════════════════════════════
  {
    cat: "Władze miejskie i samorząd",
    q: "Kim był WÓJT w nowo założonym mieście?",
    opts: [
      "Najważniejszy kupiec w mieście",
      "Przedstawiciel właściciela ziemi — pobierał daniny i przewodniczył sądowi",
      "Dowódca miejskiej straży zbrojnej",
      "Kapłan odpowiedzialny za kościół parafialny"
    ],
    answer: 1,
    explanation: "<strong>Wójt</strong> był przedstawicielem właściciela ziemi, na której powstawało miasto. W jego imieniu pobierał daniny od mieszczan, przewodniczył miejskiemu sądowi i odpowiadał za porządek w mieście. Był to pierwszy zarządca nowo zakładanego miasta."
  },
  {
    cat: "Władze miejskie i samorząd",
    q: "Na czym polegał SAMORZĄD MIEJSKI, który mieszczanie uzyskali z czasem?",
    opts: [
      "Mieszczanie mogli zbierać podatki zamiast wójta",
      "Mieszczanie sami sprawowali władzę w swojej miejscowości, wybierając radę miejską i burmistrza",
      "Mieszczanie uzyskali prawo wyboru króla",
      "Mieszczanie mogli nie platić żadnych danin"
    ],
    answer: 1,
    explanation: "Dzięki <strong>samorządowi miejskiemu</strong> mieszczanie sami sprawowali władzę w swojej miejscowości. Ze swojego grona wybierali <strong>radę miejską</strong>, która uchwalała prawa, oraz <strong>burmistrza</strong> — najważniejszego urzędnika. Nadal jednak płacili daniny właścicielowi miasta."
  },
  {
    cat: "Władze miejskie i samorząd",
    q: "Co to była RADA MIEJSKA?",
    opts: [
      "Zebranie wszystkich mieszkańców miasta",
      "Organ samorządu miejskiego, który uchwalał prawa i wybierał burmistrza",
      "Sąd rozstrzygający spory między kupcami",
      "Organizacja skupiająca rzemieślników jednej specjalności"
    ],
    answer: 1,
    explanation: "<strong>Rada miejska</strong> to organ samorządu, który uchwalał obowiązujące w mieście prawa oraz wybierał <strong>burmistrza</strong>. Burmistrz dbał o to, by prawa uchwalone przez radę były przestrzegane. We władzach zasiadali wyłącznie najbogatsi mieszkańcy."
  },
  {
    cat: "Władze miejskie i samorząd",
    q: "Kim był BURMISTRZ w średniowiecznym mieście?",
    opts: [
      "Urzędnik mianowany przez króla",
      "Najważniejszy urzędnik miejski wybierany przez radę miejską, dbający o przestrzeganie prawa",
      "Przełożony wszystkich cechów rzemieślniczych",
      "Dowódca wojsk obronnych miasta"
    ],
    answer: 1,
    explanation: "<strong>Burmistrz</strong> był najważniejszym urzędnikiem miejskim. Dbał on, aby prawa uchwalane przez radę miejską były przestrzegane. Wybierała go rada miejska spośród najbogatszych mieszkańców."
  },
  {
    cat: "Władze miejskie i samorząd",
    q: "Co to była ŁAWA MIEJSKA?",
    opts: [
      "Miejsce, gdzie zbierali się kupcy na targu",
      "Własny sąd miejski, do którego prawo mieli mieszczanie",
      "Ławka przed ratuszem, gdzie zasiadał burmistrz",
      "Organizacja kupiecka chroniąca interesy handlowe"
    ],
    answer: 1,
    explanation: "<strong>Ława miejska</strong> to własny sąd miejski. Mieszczanie mieli prawo do własnego sądu zwanego lawą miejską. We władzach miasta zasiadali wyłącznie najbogatsi mieszkańcy, co prowadziło do wielu konfliktów."
  },
  {
    cat: "Władze miejskie i samorząd",
    q: "Kto zasiadał we władzach średniowiecznego miasta?",
    opts: [
      "Wszyscy mieszkańcy bez wyjątku",
      "Wyłącznie duchowni i rycerze",
      "Wyłącznie najbogatsi mieszkańcy — co prowadziło do konfliktów",
      "Przedstawiciele wszystkich grup społecznych po równo"
    ],
    answer: 2,
    explanation: "We władzach miasta zasiadali <strong>wyłącznie najbogatsi mieszkańcy</strong>. Nie dopuszczali oni do rządów przedstawicieli biedniejszych grup, co prowadziło do wielu konfliktów. Była to poważna wada systemu samorządu miejskiego."
  },

  // ═══════════════════════════════════════
  // BLOK 3: RZEMIEŚLNICY, KUPCY I CECHY
  // ═══════════════════════════════════════
  {
    cat: "Rzemieślnicy, kupcy i cechy",
    q: "Co to był CECH w średniowiecznym mieście?",
    opts: [
      "Podatek płacony przez rzemieślników",
      "Organizacja rzemieślników jednej specjalności, kontrolująca produkcję i dbająca o jakość",
      "Sąd rozstrzygający spory handlowe",
      "Nazwa dzielnicy rzemieślniczej w mieście"

let current = 0, score = 0, answered = false, shuffled = [];


function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() { shuffled = shuffle(questions); current = 0; score = 0; answered = false; }

function render() {
  const q = shuffled[current];
  const pct = (current / shuffled.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = 'Pytanie ' + (current + 1) + ' z ' + shuffled.length;

  const letters = ['A','B','C','D'];
  const optsHTML = q.opts.map((opt, i) =>
    '<button class="option-btn" id="opt' + i + '" onclick="choose(' + i + ')">' +
    '<span class="option-letter">' + letters[i] + '</span><span>' + opt + '</span></button>'
  ).join('');

  document.getElementById('quizArea').innerHTML =
    '<div class="question-card">' +
    '<div class="q-category">' + q.cat + '</div>' +
    '<div class="q-number">Pytanie ' + (current+1) + ' z ' + shuffled.length + '</div>' +
    '<div class="q-text">' + q.q + '</div>' +
    '<div class="options">' + optsHTML + '</div>' +
    '<div class="feedback" id="feedback"></div>' +
    '<div class="clearfix">' +
    '<button class="next-btn" id="nextBtn" onclick="next()">' +
    (current < shuffled.length - 1 ? 'Nastepne pytanie &rarr;' : 'Zobacz wynik &#127942;') +
    '</button></div></div>';
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = shuffled[current];
  const fb = document.getElementById('feedback');
  const allBtns = document.querySelectorAll('.option-btn');
  const correct = Array.isArray(q.answer) ? q.answer : [q.answer];
  allBtns.forEach(b => b.disabled = true);

  if (correct.includes(i)) {
    score++;
    document.getElementById('opt' + i).classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = '<div class="feedback-header">&#10003; Poprawna odpowiedz!</div><div class="feedback-body">' + q.explanation + '</div>';
  } else {
    document.getElementById('opt' + i).classList.add('wrong');
    correct.forEach(a => document.getElementById('opt' + a).classList.add('correct'));
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = '<div class="feedback-header">&#10007; Bledna odpowiedz</div><div class="feedback-body">' + q.explanation + '</div>';
  }
  document.getElementById('nextBtn').classList.add('show');
}

function next() {
  current++;
  if (current >= shuffled.length) showScore();
  else render();
}

function showScore() {
  document.getElementById('quizArea').innerHTML = '';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressText').textContent = 'Ukonczone!';
  const pct = score / shuffled.length;
  let icon, stars, msg;
  if (pct === 1)      { icon = '&#127942;'; stars = '&#11088;&#11088;&#11088;&#11088;&#11088;'; msg = 'Doskonale! Znasz sredniowieczne miasto i wies jak wlasna kieszen. Godny burmistrza lub soltys!'; }
  else if (pct >= 0.8){ icon = '&#127963;'; stars = '&#11088;&#11088;&#11088;&#11088;'; msg = 'Bardzo dobry wynik! Twoja wiedza o sredniowiecznych miastach jest imponujaca!'; }
  else if (pct >= 0.6){ icon = '&#9962;'; stars = '&#11088;&#11088;&#11088;'; msg = 'Niezle! Znasz podstawy. Warto powtorzyc material, by zostac prawdziwym ekspertem.'; }
  else if (pct >= 0.4){ icon = '&#128674;'; stars = '&#11088;&#11088;'; msg = 'Masz jeszcze sporo do nauki. Nie poddawaj sie — przeczytaj material jeszcze raz!'; }
  else                { icon = '&#128218;'; stars = '&#11088;'; msg = 'Czas na powrót do lekcji. Przeczytaj uwaznie material i sprobuj ponownie!'; }

  document.getElementById('scoreIcon').innerHTML = icon;
  document.getElementById('scoreStars').innerHTML = stars;
  document.getElementById('scoreNum').textContent = score + ' / ' + shuffled.length;
  document.getElementById('scoreMsg').textContent = msg;
  document.getElementById('scoreScreen').classList.add('show');
}

function restart() {
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('progressBar').style.width = '0%';
  init(); render();
}

init(); render();
</script>
