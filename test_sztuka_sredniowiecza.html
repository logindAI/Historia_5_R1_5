<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test: Sztuka sredniowiecza</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0e0e18;
    --parchment: #f5ead8;
    --parchment-dark: #e8d5b0;
    --teal: #1a5a5a;
    --teal-light: #3a8a8a;
    --ink: #2c1810;
    --correct: #2d6e2d;
    --wrong: #8b1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'EB Garamond', serif;
    background: var(--dark);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, #0a1a1a 0%, transparent 55%),
      radial-gradient(ellipse at 90% 80%, #1a0a00 0%, transparent 55%),
      url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='40' cy='40' r='1' fill='%23c9a84c' fill-opacity='0.06'/%3E%3C/svg%3E");
  }
  .wrapper { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }
  .header { text-align: center; margin-bottom: 50px; position: relative; }
  .header::before { content: '\1F3A8'; font-size: 1.8rem; position: absolute; left: 0; top: 50%; transform: translateY(-50%); opacity: 0.45; }
  .header::after  { content: '\26EA'; font-size: 1.8rem; position: absolute; right: 0; top: 50%; transform: translateY(-50%); opacity: 0.45; }
  .icon { font-size: 3.2rem; display: block; margin-bottom: 10px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  h1 { font-family: 'Cinzel', serif; font-size: clamp(1.6rem, 4.5vw, 2.8rem); color: var(--gold); text-shadow: 0 0 30px rgba(201,168,76,0.4), 2px 2px 0 #1a5a5a; letter-spacing: 0.04em; line-height: 1.2; }
  .subtitle { font-size: 1.1rem; color: var(--gold-light); opacity: 0.7; margin-top: 8px; font-style: italic; }
  .progress-bar-wrap { background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3); border-radius: 4px; height: 8px; margin-bottom: 10px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--teal-light), var(--gold-light)); transition: width 0.5s ease; border-radius: 4px; }
  .progress-text { text-align: right; color: var(--gold); font-size: 0.85rem; font-family: 'Cinzel', serif; margin-bottom: 30px; }
  .question-card {
    background: linear-gradient(160deg, var(--parchment) 0%, var(--parchment-dark) 100%);
    border-radius: 4px; padding: 36px 40px 30px; margin-bottom: 28px;
    border: 1px solid rgba(201,168,76,0.5);
    box-shadow: 0 0 0 4px rgba(26,90,90,0.07), 0 8px 40px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.5);
    position: relative; animation: slideIn 0.4s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .question-card::before { content:''; position:absolute; top:8px; left:8px; right:8px; bottom:8px; border:1px solid rgba(26,90,90,0.15); border-radius:2px; pointer-events:none; }
  .q-category { display:inline-block; font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; padding:3px 10px; border-radius:2px; margin-bottom:12px; background:rgba(26,90,90,0.1); border:1px solid rgba(26,90,90,0.3); color:var(--teal); }
  .q-number { font-family:'Cinzel',serif; font-size:0.75rem; color:#5a3a1a; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:6px; }
  .q-text { font-size:1.25rem; color:var(--ink); line-height:1.6; font-weight:600; margin-bottom:26px; }
  .options { display:flex; flex-direction:column; gap:12px; }
  .option-btn { background:rgba(255,255,255,0.6); border:2px solid rgba(201,168,76,0.35); border-radius:4px; padding:14px 18px; text-align:left; cursor:pointer; font-family:'EB Garamond',serif; font-size:1.05rem; color:var(--ink); transition:all 0.2s ease; display:flex; align-items:center; gap:14px; }
  .option-btn:hover:not(:disabled) { background:rgba(26,90,90,0.09); border-color:var(--teal-light); transform:translateX(4px); box-shadow:-3px 0 0 var(--teal-light); }
  .option-letter { font-family:'Cinzel',serif; font-size:0.85rem; font-weight:700; width:28px; height:28px; border-radius:50%; background:rgba(201,168,76,0.2); border:1px solid rgba(201,168,76,0.5); display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--teal); }
  .option-btn.correct { background:rgba(45,110,45,0.15); border-color:var(--correct); box-shadow:-4px 0 0 var(--correct),0 0 20px rgba(45,110,45,0.12); animation:correctPulse 0.4s ease; }
  @keyframes correctPulse { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
  .option-btn.correct .option-letter { background:var(--correct); color:white; border-color:var(--correct); }
  .option-btn.wrong { background:rgba(139,26,26,0.1); border-color:var(--wrong); box-shadow:-4px 0 0 var(--wrong); animation:shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  .option-btn.wrong .option-letter { background:var(--wrong); color:white; border-color:var(--wrong); }
  .option-btn:disabled { cursor:default; }
  .feedback { display:none; margin-top:22px; padding:18px 22px; border-radius:4px; font-size:1rem; line-height:1.75; animation:fadeIn 0.35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .feedback.show { display:block; }
  .feedback.correct-fb { background:rgba(45,110,45,0.10); border:1px solid rgba(45,110,45,0.35); border-left:4px solid var(--correct); }
  .feedback.wrong-fb   { background:rgba(139,26,26,0.07); border:1px solid rgba(139,26,26,0.25); border-left:4px solid var(--wrong); }
  .feedback-header { font-family:'Cinzel',serif; font-size:0.85rem; font-weight:700; letter-spacing:0.1em; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .feedback.correct-fb .feedback-header { color:var(--correct); }
  .feedback.wrong-fb   .feedback-header { color:var(--wrong); }
  .feedback-body { color:var(--ink); }
  .feedback-body strong { color:var(--teal); }
  .next-btn { display:none; margin-top:22px; background:linear-gradient(135deg,#1a5a5a 0%,#0a3a3a 100%); color:var(--gold-light); border:1px solid rgba(201,168,76,0.4); border-radius:4px; padding:13px 32px; font-family:'Cinzel',serif; font-size:0.9rem; letter-spacing:0.1em; cursor:pointer; transition:all 0.2s ease; box-shadow:0 4px 15px rgba(0,0,0,0.3); float:right; }
  .next-btn:hover { background:linear-gradient(135deg,#2a7a7a 0%,#1a5a5a 100%); transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.4); }
  .next-btn.show { display:block; }
  .clearfix::after { content:''; display:table; clear:both; }
  .score-screen { display:none; text-align:center; background:linear-gradient(160deg,var(--parchment) 0%,var(--parchment-dark) 100%); border-radius:4px; padding:60px 40px; border:1px solid rgba(201,168,76,0.5); box-shadow:0 8px 40px rgba(0,0,0,0.6); animation:slideIn 0.5s ease; }
  .score-screen.show { display:block; }
  .score-icon { font-size:4rem; margin-bottom:10px; }
  .stars { font-size:2rem; margin-bottom:16px; letter-spacing:4px; }
  .score-title { font-family:'Cinzel',serif; font-size:2rem; color:var(--gold); text-shadow:2px 2px 0 #1a5a5a; margin-bottom:10px; }
  .score-num { font-family:'Cinzel',serif; font-size:4rem; color:var(--teal); line-height:1; margin:20px 0; }
  .score-msg { font-size:1.15rem; color:var(--ink); font-style:italic; max-width:500px; margin:0 auto 30px; line-height:1.7; }
  .restart-btn { background:linear-gradient(135deg,#1a5a5a 0%,#0a3a3a 100%); color:var(--gold-light); border:1px solid rgba(201,168,76,0.4); border-radius:4px; padding:15px 40px; font-family:'Cinzel',serif; font-size:1rem; letter-spacing:0.1em; cursor:pointer; transition:all 0.2s ease; box-shadow:0 4px 15px rgba(0,0,0,0.3); }
  .restart-btn:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(0,0,0,0.4); }
  .divider { text-align:center; color:var(--gold); font-size:1.2rem; opacity:0.4; margin:6px 0 30px; letter-spacing:0.5em; }
  @media (max-width:600px) { .question-card { padding:22px 18px 18px; } .header::before,.header::after { display:none; } }
</style>
</head>

var current = 0, score = 0, answered = false, shuffled = [];


function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function init() { shuffled = shuffle(questions); current = 0; score = 0; answered = false; }

function render() {
  var q = shuffled[current];
  document.getElementById('progressBar').style.width = (current / shuffled.length * 100) + '%';
  document.getElementById('progressText').textContent = 'Pytanie ' + (current + 1) + ' z ' + shuffled.length;
  var letters = ['A','B','C','D'];
  var opts = '';
  for (var i = 0; i < q.opts.length; i++) {
    opts += '<button class="option-btn" id="opt' + i + '" onclick="choose(' + i + ')">' +
      '<span class="option-letter">' + letters[i] + '</span><span>' + q.opts[i] + '</span></button>';
  }
  document.getElementById('quizArea').innerHTML =
    '<div class="question-card">' +
    '<div class="q-category">' + q.cat + '</div>' +
    '<div class="q-number">Pytanie ' + (current+1) + ' z ' + shuffled.length + '</div>' +
    '<div class="q-text">' + q.q + '</div>' +
    '<div class="options">' + opts + '</div>' +
    '<div class="feedback" id="feedback"></div>' +
    '<div class="clearfix"><button class="next-btn" id="nextBtn" onclick="next()">' +
    (current < shuffled.length - 1 ? 'Nastepne pytanie &rarr;' : 'Zobacz wynik &#127942;') +
    '</button></div></div>';
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  var q = shuffled[current];
  var correct = Array.isArray(q.answer) ? q.answer : [q.answer];
  var btns = document.querySelectorAll('.option-btn');
  for (var b = 0; b < btns.length; b++) btns[b].disabled = true;
  var fb = document.getElementById('feedback');
  if (correct.indexOf(i) !== -1) {
    score++;
    document.getElementById('opt' + i).classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = '<div class="feedback-header">&#10003; Poprawna odpowiedz!</div><div class="feedback-body">' + q.explanation + '</div>';
  } else {
    document.getElementById('opt' + i).classList.add('wrong');
    for (var c = 0; c < correct.length; c++) document.getElementById('opt' + correct[c]).classList.add('correct');
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = '<div class="feedback-header">&#10007; Bledna odpowiedz</div><div class="feedback-body">' + q.explanation + '</div>';
  }
  document.getElementById('nextBtn').classList.add('show');
}

function next() {
  current++;
  if (current >= shuffled.length) showScore();
  else render();
}

function showScore() {
  document.getElementById('quizArea').innerHTML = '';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressText').textContent = 'Ukonczone!';
  var pct = score / shuffled.length;
  var icon, stars, msg;
  if (pct === 1)       { icon='&#127942;'; stars='&#11088;&#11088;&#11088;&#11088;&#11088;'; msg='Doskonale! Znasz sredniowieczna sztuke jak Wit Stwosz swoje dluto. Prawdziwy mistrz!'; }
  else if (pct >= 0.8) { icon='&#127912;'; stars='&#11088;&#11088;&#11088;&#11088;';         msg='Bardzo dobrze! Twoja wiedza o gotyku i romanszczytnie oraz dzielach sztuki jest imponujaca!'; }
  else if (pct >= 0.6) { icon='&#9962;';   stars='&#11088;&#11088;&#11088;';                 msg='Niezle! Znasz podstawy. Powroc do materialu o stylach architektonicznych i sprobuj jeszcze raz.'; }
  else if (pct >= 0.4) { icon='&#128218;'; stars='&#11088;&#11088;';                         msg='Jest jeszcze sporo do nauki. Przyjrzyj sie dokladnie roznicom miedzy stylem romanskim a gotyckim!'; }
  else                  { icon='&#9997;';   stars='&#11088;';                                 msg='Czas wrocic do ksiazki! Nie poddawaj sie &mdash; Wit Stwosz tez musial cwiczyc, zanim stworzyl swoj oltarz.'; }
  document.getElementById('scoreIcon').innerHTML = icon;
  document.getElementById('scoreStars').innerHTML = stars;
  document.getElementById('scoreNum').textContent = score + ' / ' + shuffled.length;
  document.getElementById('scoreMsg').innerHTML = msg;
  document.getElementById('scoreScreen').classList.add('show');
}

function restart() {
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('progressBar').style.width = '0%';
  init(); render();
}

init(); render();
</script>
