<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz – Polska Pierwszych Piastów (120 pytań)</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9972a;
    --dark-gold: #9a6f1a;
    --red: #7a1515;
    --parchment: #f5edd6;
    --parchment2: #ede0c4;
    --dark: #130e05;
    --correct: #1e6b30;
    --wrong: #8b1a1a;
    --shadow: 0 4px 28px rgba(0,0,0,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 70px;
    background-image:
      radial-gradient(ellipse at 10% 10%, #2e1200 0%, transparent 55%),
      radial-gradient(ellipse at 90% 90%, #1a0900 0%, transparent 55%);
  }
  header {
    width: 100%;
    text-align: center;
    padding: 30px 20px 20px;
    border-bottom: 2px solid var(--gold);
    margin-bottom: 24px;
    background: linear-gradient(180deg,#0a0600 0%,transparent 100%);
  }
  header h1 {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: clamp(1.3rem, 3.5vw, 2.2rem);
    letter-spacing: 2px;
    text-shadow: 0 2px 14px rgba(201,151,42,0.45);
  }
  header p { color: #c8b98a; margin-top: 6px; font-size: .95rem; }

  .top-bar {
    width: 100%; max-width: 820px;
    padding: 0 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    justify-content: center;
    margin-bottom: 18px;
  }
  .score-box {
    background: rgba(201,151,42,0.10);
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    padding: 8px 24px;
    text-align: center;
    color: var(--parchment);
    font-family: 'Cinzel', serif;
    min-width: 100px;
  }
  .score-box .sn { font-size: 1.9rem; color: var(--gold); font-weight: 800; display: block; line-height: 1.1; }
  .score-box .sl { font-size: .68rem; letter-spacing: 1px; opacity: .7; }

  .prog-wrap { width: 100%; max-width: 820px; padding: 0 14px; margin-bottom: 20px; }
  .prog-label { color: #c8b98a; font-size: .8rem; text-align: right; margin-bottom: 4px; }
  .prog-bg { background: #1e1200; border-radius: 20px; height: 9px; border: 1px solid var(--gold); overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #f0c040); border-radius: 20px; transition: width .35s; width: 0%; }

  .quiz-container { width: 100%; max-width: 820px; padding: 0 14px; }

  .qcard {
    background: var(--parchment);
    border-radius: 14px;
    box-shadow: var(--shadow), 0 0 0 2.5px var(--dark-gold);
    margin-bottom: 22px;
    overflow: hidden;
    animation: fadeUp .35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .qhead {
    background: linear-gradient(90deg, var(--red) 0%, #5a1010 100%);
    padding: 11px 18px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .qnum {
    font-family: 'Cinzel', serif;
    color: var(--gold);
    font-size: .8rem;
    font-weight: 800;
    background: rgba(0,0,0,.3);
    border-radius: 50%;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .qtxt { color: #fff; font-weight: 700; font-size: .98rem; line-height: 1.45; flex: 1; }

  .opts { padding: 13px 16px 15px; display: grid; gap: 8px; }
  .obtn {
    background: var(--parchment2);
    border: 2px solid #c9a96e;
    border-radius: 8px;
    padding: 9px 14px;
    text-align: left;
    cursor: pointer;
    font-family: 'Lato', sans-serif;
    font-size: .93rem;
    color: #1a1209;
    transition: background .15s, border-color .15s, transform .1s;
    display: flex; align-items: flex-start; gap: 9px;
  }
  .obtn:hover:not(:disabled) { background: #e6d19a; border-color: var(--gold); transform: translateX(3px); }
  .obtn:disabled { cursor: default; }
  .oltr { font-family:'Cinzel',serif; font-weight:800; color:var(--red); min-width:20px; font-size:.95rem; flex-shrink:0; }
  .obtn.correct { background:#d4edda; border-color:var(--correct); color:#12481f; }
  .obtn.correct .oltr { color:var(--correct); }
  .obtn.wrong { background:#f8d7da; border-color:var(--wrong); color:#6b1a1a; }
  .obtn.wrong .oltr { color:var(--wrong); }
  .obtn.reveal { background:#d4edda; border-color:var(--correct); opacity:.72; }

  .fb {
    margin: 0 16px 12px;
    padding: 8px 13px;
    border-radius: 8px;
    font-weight: 700;
    font-size: .9rem;
    display: none;
    align-items: flex-start;
    gap: 7px;
    line-height: 1.4;
  }
  .fb.show { display: flex; }
  .fb.cfb { background: #d4edda; color: #12481f; border: 1.5px solid var(--correct); }
  .fb.wfb { background: #f8d7da; color: #6b1a1a; border: 1.5px solid var(--wrong); }
  .fb .fi { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }

  /* RESULT */
  .result-section { display:none; width:100%; max-width:820px; padding:0 14px; margin-top:10px; }
  .result-card {
    background: var(--parchment);
    border-radius: 16px;
    box-shadow: var(--shadow), 0 0 0 3px var(--gold);
    padding: 38px 28px;
    text-align: center;
  }
  .result-card .crown { font-size:3rem; display:block; margin-bottom:8px; }
  .result-card h2 { font-family:'Cinzel',serif; color:var(--red); font-size:1.9rem; margin-bottom:10px; }
  .result-score { font-family:'Cinzel',serif; font-size:3.2rem; color:var(--gold); font-weight:800; display:block; margin:8px 0; }
  .result-msg { color:#5a3a10; font-size:1.05rem; margin:10px 0 22px; }

  .btn-row { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  .rbtn {
    border-radius: 10px;
    padding: 11px 28px;
    font-family: 'Cinzel', serif;
    font-size: .95rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity .2s, transform .15s;
    border: 2px solid var(--gold);
  }
  .rbtn:hover { opacity:.83; transform:scale(1.04); }
  .rbtn.primary { background:linear-gradient(90deg,var(--red),#5a1010); color:var(--gold); }
  .rbtn.restart { background:linear-gradient(90deg,#1a3a6a,#0d1f3a); color:#a8c8f0; border-color:#6a9ad0; }

  .breakdown { margin-top: 22px; text-align: left; }
  .breakdown h3 { font-family:'Cinzel',serif; color:var(--red); font-size:1rem; margin-bottom:10px; text-align:center; }
  .bd-row { display:flex; gap:8px; margin-bottom:6px; align-items:center; font-size:.88rem; color:#3a2000; }
  .bd-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .bd-correct { background:var(--correct); }
  .bd-wrong { background:var(--wrong); }

  @media(max-width:500px){
    .qtxt{font-size:.9rem;}
    .obtn{font-size:.87rem; padding:8px 11px;}
  }
</style>
</head>
<body>

<header>
  <h1>⚔️ Quiz Historyczny – 120 Pytań ⚔️</h1>
  <p>Polska Pierwszych Piastów · Rozdział VI · Klasa 6</p>
</header>

<div class="top-bar">
  <div class="score-box"><span class="sn" id="cntC">0</span><span class="sl">POPRAWNE</span></div>
  <div class="score-box"><span class="sn" id="cntW">0</span><span class="sl">BŁĘDNE</span></div>
  <div class="score-box"><span class="sn" id="cntA">0</span><span class="sl">ODPOWIEDZIANO</span></div>
  <div class="score-box"><span class="sn" id="cntR">120</span><span class="sl">POZOSTAŁO</span></div>
</div>

<div class="prog-wrap">
  <div class="prog-label" id="progLbl">0 / 120 pytań</div>
  <div class="prog-bg"><div class="prog-fill" id="progFill"></div></div>
</div>

<div class="quiz-container" id="quizContainer"></div>

<div class="result-section" id="resultSection">
  <div class="result-card">
    <span class="crown">👑</span>
    <h2>Koniec Quizu!</h2>
    <span class="result-score" id="finalScore"></span>
    <p class="result-msg" id="finalMsg"></p>
    <div class="btn-row">
      <button class="rbtn primary" id="dlBtn" onclick="downloadTxt()">💾 Pobierz wynik (.txt)</button>
      <button class="rbtn restart" onclick="restartQuiz()">🔄 Spróbuj ponownie</button>
    </div>
    <p style="color:#5a3a10;font-size:.82rem;margin:14px 0 6px;">📋 Wynik quizu (zaznacz i skopiuj lub pobierz przyciskiem powyżej):</p>
    <textarea id="resultTxt" readonly
      style="width:100%;height:260px;font-family:monospace;font-size:.78rem;
             background:#fffdf5;border:2px solid #c9a96e;border-radius:8px;
             padding:10px;color:#2a1a00;resize:vertical;"></textarea>
    <div class="breakdown" id="breakdown"></div>
  </div>
</div>

<script>
/* ===================================================
   120 PYTAŃ – cały materiał rozdziału VI
   =================================================== */
const questions = [

{q:"Jak nazywała się żona Mieszka II?",
 o:["Dobronega","Rycheza","Adelajda","Świętosława"], a:1},

 o:["Cesarza Henryka V","Cesarza Ottona III","Króla Czech","Papieża Sylwestra II"], a:1},

{q:"Z jakich języków był znany Mieszko II?",
 o:["Polskiego i węgierskiego","Arabskiego i hebrajskiego","Greckiego i łacińskiego","Czeskiego i rosyjskiego"], a:2},

{q:"W którym roku Polska utraciła Milsko, Łużyce i Grody Czerwieńskie?",

{q:"Kto był starszym bratem Mieszka II, który wykorzystał trudną sytuację kraju?",

{q:"Co Bezprym odesłał cesarzowi?",
 o:["Miecz koronacyjny","Insygnia królewskie – koronę, berło i jabłko","Złote monety","Relikwie świętego Wojciecha"], a:1},

{q:"Co to są insygnia królewskie?",
 o:["Dokumenty królewskie","Pieczęć i tarcza króla","Korona, berło oraz jabłko królewskie","Zbroja i miecz władcy"], a:2},

{q:"Kiedy zmarł Mieszko II?",
 o:["W 1025 r.","W 1031 r.","W 1034 r.","W 1038 r."], a:2},

{q:"Co wydarzyło się w Polsce bezpośrednio po śmierci Mieszka II?",
 o:["Nastąpił rozkwit państwa i Kościoła","Polska podbiła Czechy","Wybuchł bunt możnych i ludności chcącej wrócić do pogaństwa","Nawiązano pokój z cesarstwem"], a:2},

/* ── KRYZYS – CZESI, KAZIMIERZ ── */
{q:"W którym roku Czesi spustoszyli Wielkopolskę?",

{q:"Co Czesi wywieźli z Gniezna podczas najazdu w 1038 roku?",

{q:"Jakie polskie miasta Czesi doszczętnie zniszczyli w 1038 roku?",

{q:"Co Czesi przyłączyli do swojego państwa podczas kryzysu?",

{q:"Dokąd uciekł książę Kazimierz, syn Mieszka II?",

{q:"Które miasto stało się główną siedzibą władcy zamiast zniszczonego Gniezna?",

{q:"Dlaczego Kazimierz otrzymał przydomek Odnowiciel?",

{q:"Jakie ziemie weszły w skład państwa Kazimierza Odnowiciela?",

 o:["Sprowadził krzyżowców","Odbudował polskie biskupstwa i kazał wznosić nowe kościoły","Wysłał misjonarzy do Prus","Przekazał władzę nad Kościołem cesarzowi"], a:1},

{q:"Kiedy żył Kazimierz Odnowiciel?",

{q:"Z kim Kazimierz Odnowiciel zawarł sojusz, poślubiając Dobronegę?",

{q:"Która z poniższych pozycji NIE była przyczyną kryzysu Królestwa Polskiego na początku XI wieku?",

{q:"W jakim sporze wsparł Bolesław Śmiały papieża Grzegorza VII?",

{q:"Kto stał na czele buntu możnych przeciwko Bolesławowi Śmiałemu?",

{q:"Co spotkało biskupa Stanisława z wyroku Bolesława Śmiałego?",

{q:"W którym roku Bolesław Śmiały musiał uciec z kraju?",

{q:"Dokąd uciekł Bolesław Śmiały?",

{q:"W jakim wieku żył Bolesław Śmiały?",

{q:"Dlaczego małżeństwa Władysława Hermana miały znaczenie polityczne?",

 o:["Bolesław Chrobry","Mieszko II","Kazimierz Odnowiciel","Bolesław Śmiały"], a:2},

{q:"Jaką rolę w szerszym kontekście europejskim odegrało wsparcie Bolesława Śmiałego dla papieża Grzegorza VII?",
 o:["Pozwoliło mu zdobyć nowe terytoria na zachodzie","Spowodowało powrót arcybiskupstwa do Gniezna i umożliwiło koronację królewską w 1076 r.","Zapewniło pokój z cesarstwem na 50 lat","Pozwoliło odbyć krucjatę do Ziemi Świętej"], a:1}

];

/* ── STATE ── */
let cC=0, cW=0, cA=0;
const TOTAL=questions.length;
const firstAnswers=new Array(TOTAL).fill(null); // null = unanswered

/* ── BUILD ── */
function buildQuiz(){
  const container=document.getElementById('quizContainer');
  container.innerHTML='';
  questions.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='qcard';
    card.id='card'+i;
    const letters=['A','B','C','D'];
    const optsHtml=q.o.map((opt,oi)=>
      `<button class="obtn" onclick="answer(${i},${oi})" id="ob${i}_${oi}">
         <span class="oltr">${letters[oi]}.</span><span>${opt}</span>
       </button>`
    ).join('');
    card.innerHTML=`
      <div class="qhead">
        <span class="qnum">${i+1}</span>
        <span class="qtxt">${q.q}</span>
      </div>
      <div class="opts">${optsHtml}</div>
      <div class="fb" id="fb${i}">
        <span class="fi"></span><span class="ft"></span>
      </div>`;
    container.appendChild(card);
  });
  updateUI();
}

/* ── ANSWER ── */
function answer(qi,oi){
  if(firstAnswers[qi]!==null) return; // already answered
  firstAnswers[qi]=oi;

  const q=questions[qi];
  const correct=q.a;
  const btns=document.querySelectorAll(`[id^="ob${qi}_"]`);
  btns.forEach(b=>b.disabled=true);

  const chosen=document.getElementById(`ob${qi}_${oi}`);
  const fb=document.getElementById(`fb${qi}`);

  if(oi===correct){
    chosen.classList.add('correct');
    fb.classList.add('show','cfb');
    fb.querySelector('.fi').textContent='✅';
    fb.querySelector('.ft').textContent='Świetnie! Dobra odpowiedź!';
    cC++;
    document.getElementById('cntC').textContent=cC;
  } else {
    chosen.classList.add('wrong');
    document.getElementById(`ob${qi}_${correct}`).classList.add('reveal');
    fb.classList.add('show','wfb');
    fb.querySelector('.fi').textContent='❌';
    const letters=['A','B','C','D'];
    fb.querySelector('.ft').textContent=
      `Błąd! Poprawna odpowiedź: ${letters[correct]}. ${q.o[correct]}`;
    cW++;
    document.getElementById('cntW').textContent=cW;
  }

  cA++;
  document.getElementById('cntA').textContent=cA;
  document.getElementById('cntR').textContent=TOTAL-cA;
  updateUI();

  if(cA===TOTAL) setTimeout(showResult,600);
  else {
    // scroll to next unanswered
    setTimeout(()=>{
      for(let j=qi+1;j<TOTAL;j++){
        if(firstAnswers[j]===null){
          document.getElementById('card'+j)
            .scrollIntoView({behavior:'smooth',block:'center'});
          break;
        }
      }
    },350);
  }
}

/* ── PROGRESS ── */
function updateUI(){
  const pct=(cA/TOTAL)*100;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLbl').textContent=`${cA} / ${TOTAL} pytań`;
}

/* ── RESULT ── */
let savedTxtContent = '';

function buildResultText(){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const dateStr=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const timeStr=`${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const pct=Math.round((cC/TOTAL)*100);
  const grade=getGrade(pct);
  const L='\r\n';
  let t='';
  t+='============================================================'+L;
  t+='  QUIZ HISTORYCZNY - POLSKA PIERWSZYCH PIASTOW'+L;
  t+='  Rozdzial VI - Klasa 6'+L;
  t+='============================================================'+L;
  t+=`Data i godzina:   ${dateStr}  ${timeStr}`+L;
  t+=`Wynik koncowy:    ${cC} / ${TOTAL} (${pct}%)`+L;
  t+=`Ocena:            ${grade}`+L;
  t+=`Poprawne:         ${cC}`+L;
  t+=`Bledne:           ${cW}`+L;
  t+=L;
  t+='UWAGA: Liczy sie tylko PIERWSZA udzielona odpowiedz.'+L;
  t+=L;
  t+='------------------------------------------------------------'+L;
  t+='SZCZEGOLOWE WYNIKI (pytanie po pytaniu):'+L;
  t+='------------------------------------------------------------'+L;
  const letters=['A','B','C','D'];
  questions.forEach((q,i)=>{
    const given=firstAnswers[i];
    const isOk=(given===q.a);
    t+=L;
    t+=`Pyt. ${String(i+1).padStart(3,'0')}  [${isOk?'POPRAWNA':'BLEDNA  '}]`+L;
    t+=`  Pytanie:          ${q.q}`+L;
    t+=`  Twoja odpowiedz:  ${given!==null ? letters[given]+'. '+q.o[given] : '(brak)'}`+L;
    if(!isOk) t+=`  Poprawna odp.:    ${letters[q.a]}. ${q.o[q.a]}`+L;
  });
  t+=L;
  t+='============================================================'+L;
  t+='Koniec raportu.'+L;
  t+='============================================================'+L;
  return { text: t, dateStr };
}

function showResult(){
  const rs=document.getElementById('resultSection');
  rs.style.display='block';
    downloadTxt;
  const pct=Math.round((cC/TOTAL)*100);
  document.getElementById('finalScore').textContent=`${cC} / ${TOTAL}  (${pct}%)`;
  let msg='';
  if(pct>=95) msg='🏆 Doskonale! Jesteś mistrzem historii Pierwszych Piastów!';
  else if(pct>=85) msg='🌟 Bardzo dobrze! Znasz ten materiał świetnie!';
  else if(pct>=70) msg='👍 Dobrze! Warto jednak powtórzyć kilka zagadnień.';
  else if(pct>=50) msg='📖 Połowa materiału opanowana. Wróć do podręcznika i powtórz.';
  else msg='📚 Koniecznie jeszcze raz przejrzyj materiał i spróbuj ponownie!';
  document.getElementById('finalMsg').textContent=msg;

  const bd=document.getElementById('breakdown');
  bd.innerHTML=`
    <div class="breakdown">
      <h3>📊 Podsumowanie szczegółowe</h3>
      <div class="bd-row"><span class="bd-dot bd-correct"></span>Poprawnych odpowiedzi: <strong>${cC}</strong></div>
      <div class="bd-row"><span class="bd-dot bd-wrong"></span>Błędnych odpowiedzi: <strong>${cW}</strong></div>
      <div class="bd-row">Procent poprawnych: <strong>${pct}%</strong></div>
      <div class="bd-row">Ocena: <strong>${getGrade(pct)}</strong></div>
    </div>`;

  // Build and show text in textarea
  const {text, dateStr} = buildResultText();
  savedTxtContent = text;
  document.getElementById('resultTxt').value = text;
  document.getElementById('dlBtn').dataset.date = dateStr;

  rs.scrollIntoView({behavior:'smooth',block:'start'});
}

function downloadTxt(){
  if(!savedTxtContent) return;
  const dateStr = document.getElementById('dlBtn').dataset.date || 'wynik';
  const blob = new Blob(['\uFEFF'+savedTxtContent], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `quiz_wynik_${dateStr}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function getGrade(pct){
  if(pct>=95) return '6 (celujacy)';
  if(pct>=85) return '5 (bardzo dobry)';
  if(pct>=70) return '4 (dobry)';
  if(pct>=55) return '3 (dostateczny)';
  if(pct>=40) return '2 (dopuszczajacy)';
  return '1 (niedostateczny)';
}

/* ── RESTART ── */
function restartQuiz(){
  cC=0; cW=0; cA=0;
  firstAnswers.fill(null);
  document.getElementById('cntC').textContent=0;
  document.getElementById('cntW').textContent=0;
  document.getElementById('cntA').textContent=0;
  document.getElementById('cntR').textContent=TOTAL;
  document.getElementById('resultSection').style.display='none';
  buildQuiz();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ── INIT ── */
buildQuiz();
</script>
</body>
</html>
