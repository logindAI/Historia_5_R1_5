<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test: Epoka Rycerzy</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0e1a10;
    --parchment: #f5ead8;
    --parchment-dark: #e8d5b0;
    --steel: #3a5a6a;
    --steel-light: #5b8fa8;
    --ink: #2c1810;
    --correct: #2d6e2d;
    --wrong: #8b1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'EB Garamond', serif;
    background: var(--dark);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 60%, #0a1f12 0%, transparent 55%),
      radial-gradient(ellipse at 90% 20%, #1a0a00 0%, transparent 55%),
      url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.03'%3E%3Cpath d='M40 0 L42 38 L80 40 L42 42 L40 80 L38 42 L0 40 L38 38 Z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .wrapper {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 50px;
    position: relative;
  }
  .header::before { content: '🛡'; font-size: 2rem; position: absolute; left: 0; top: 50%; transform: translateY(-50%); opacity: 0.5; }
  .header::after  { content: '🗡'; font-size: 2rem; position: absolute; right: 0; top: 50%; transform: translateY(-50%); opacity: 0.5; }

  .icon {
    font-size: 3.2rem;
    display: block;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(201,168,76,0.4), 2px 2px 0 #5a7a30;
    letter-spacing: 0.05em;
    line-height: 1.2;
  }
  .subtitle {
    font-size: 1.1rem;
    color: var(--gold-light);
    opacity: 0.7;
    margin-top: 8px;
    font-style: italic;
  }

  .progress-bar-wrap {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    height: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #5a8a30, var(--gold-light));
    transition: width 0.5s ease;
    border-radius: 4px;
  }
  .progress-text {
    text-align: right;
    color: var(--gold);
    font-size: 0.85rem;
    font-family: 'Cinzel', serif;
    margin-bottom: 30px;
  }

  .question-card {
    background: linear-gradient(160deg, var(--parchment) 0%, var(--parchment-dark) 100%);
    border-radius: 4px;
    padding: 36px 40px 30px;
    margin-bottom: 28px;
    border: 1px solid rgba(201,168,76,0.5);
    box-shadow:
      0 0 0 4px rgba(201,168,76,0.06),
      0 8px 40px rgba(0,0,0,0.65),
      inset 0 1px 0 rgba(255,255,255,0.5);
    position: relative;
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(90,138,48,0.2);
    border-radius: 2px;
    pointer-events: none;
  }

  /* category badge */
  .q-category {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 12px;
    background: rgba(90,138,48,0.15);
    border: 1px solid rgba(90,138,48,0.35);
    color: #3a6a1a;
  }

  .q-number {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: #5a3a1a;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .q-text {
    font-size: 1.25rem;
    color: var(--ink);
    line-height: 1.6;
    font-weight: 600;
    margin-bottom: 26px;
  }

  .options { display: flex; flex-direction: column; gap: 12px; }

  .option-btn {
    background: rgba(255,255,255,0.6);
    border: 2px solid rgba(201,168,76,0.35);
    border-radius: 4px;
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    font-family: 'EB Garamond', serif;
    font-size: 1.05rem;
    color: var(--ink);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .option-btn:hover:not(:disabled) {
    background: rgba(90,138,48,0.12);
    border-color: #7ab040;
    transform: translateX(4px);
    box-shadow: -3px 0 0 #7ab040;
  }
  .option-letter {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 700;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(201,168,76,0.2);
    border: 1px solid rgba(201,168,76,0.5);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #3a6a1a;
  }

  .option-btn.correct {
    background: rgba(45,110,45,0.15);
    border-color: var(--correct);
    box-shadow: -4px 0 0 var(--correct), 0 0 20px rgba(45,110,45,0.12);
    animation: correctPulse 0.4s ease;
  }
  @keyframes correctPulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
  .option-btn.correct .option-letter { background: var(--correct); color: white; border-color: var(--correct); }

  .option-btn.wrong {
    background: rgba(139,26,26,0.1);
    border-color: var(--wrong);
    box-shadow: -4px 0 0 var(--wrong);
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25%       { transform: translateX(-5px); }
    75%       { transform: translateX(5px); }
  }
  .option-btn.wrong .option-letter { background: var(--wrong); color: white; border-color: var(--wrong); }
  .option-btn:disabled { cursor: default; }

  .feedback {
    display: none;
    margin-top: 22px;
    padding: 18px 22px;
    border-radius: 4px;
    font-size: 1rem;
    line-height: 1.75;
    animation: fadeIn 0.35s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .feedback.show { display: block; }
  .feedback.correct-fb {
    background: rgba(45,110,45,0.10);
    border: 1px solid rgba(45,110,45,0.35);
    border-left: 4px solid var(--correct);
  }
  .feedback.wrong-fb {
    background: rgba(139,26,26,0.07);
    border: 1px solid rgba(139,26,26,0.25);
    border-left: 4px solid var(--wrong);
  }
  .feedback-header {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .feedback.correct-fb .feedback-header { color: var(--correct); }
  .feedback.wrong-fb   .feedback-header { color: var(--wrong); }
  .feedback-body { color: var(--ink); }
  .feedback-body strong { color: #3a6a1a; }

  .next-btn {
    display: none;
    margin-top: 22px;
    background: linear-gradient(135deg, #2d5a1a 0%, #1a3a0a 100%);
    color: var(--gold-light);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 4px;
    padding: 13px 32px;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    float: right;
  }
  .next-btn:hover {
    background: linear-gradient(135deg, #3d7a2a 0%, #2a5a1a 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .next-btn.show { display: block; }
  .clearfix::after { content: ''; display: table; clear: both; }

  /* SCORE */
  .score-screen {
    display: none;
    text-align: center;
    background: linear-gradient(160deg, var(--parchment) 0%, var(--parchment-dark) 100%);
    border-radius: 4px;
    padding: 60px 40px;
    border: 1px solid rgba(201,168,76,0.5);
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    animation: slideIn 0.5s ease;
  }
  .score-screen.show { display: block; }
  .score-icon { font-size: 4rem; margin-bottom: 20px; }
  .score-title { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--gold); text-shadow: 2px 2px 0 #5a7a30; margin-bottom: 10px; }
  .score-num { font-family: 'Cinzel', serif; font-size: 4rem; color: #3a6a1a; line-height: 1; margin: 20px 0; }
  .score-msg { font-size: 1.15rem; color: var(--ink); font-style: italic; max-width: 500px; margin: 0 auto 30px; line-height: 1.7; }
  .restart-btn {
    background: linear-gradient(135deg, #2d5a1a 0%, #1a3a0a 100%);
    color: var(--gold-light);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 4px;
    padding: 15px 40px;
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }

  .divider { text-align: center; color: var(--gold); font-size: 1.2rem; opacity: 0.4; margin: 6px 0 30px; letter-spacing: 0.5em; }

  /* score stars */
  .stars { font-size: 2rem; margin-bottom: 14px; letter-spacing: 4px; }

  @media (max-width: 600px) {
    .question-card { padding: 22px 18px 18px; }
    .header::before, .header::after { display: none; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <span class="icon">⚔️</span>
    <h1>Epoka Rycerzy</h1>
    <div class="subtitle">Dział 2 — Obowiązki, droga, wyposażenie i turnieje</div>
  </div>
  <div class="divider">✦ ✦ ✦</div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-text" id="progressText">Pytanie 1 z 28</div>

  <div id="quizArea"></div>

  <div class="score-screen" id="scoreScreen">
    <div class="score-icon" id="scoreIcon">🏆</div>
    <div class="stars" id="scoreStars"></div>
    <div class="score-title">Koniec testu!</div>
    <div class="score-num" id="scoreNum">0/28</div>
    <div class="score-msg" id="scoreMsg"></div>
    <button class="restart-btn" onclick="restart()">⚔ Zagraj ponownie</button>
  </div>
</div>

<script>
const questions = [

  // ══════════════════════════════════════
  // BLOK 1: RYCERZE — ROLA I OBOWIĄZKI
  // ══════════════════════════════════════
  {
    cat: "Rycerze — rola i obowiązki",
    q: "Jakie było GŁÓWNE zadanie średniowiecznych rycerzy?",
    opts: [
      "Handel i zbieranie podatków dla króla",
      "Ochrona państwa i jego mieszkańców w razie wojny lub najazdu",
      "Budowanie kościołów i klasztorów",
      "Zarządzanie miastami i samorządem"
    ],
    answer: 1,
    explanation: "Głównym zadaniem rycerzy była <strong>ochrona państwa i jego mieszkańców</strong> w razie wojny lub nieprzyjacielskiego najazdu. Z czasem rycerstwo stało się odrębnym stanem społecznym z własnymi przywilejami i obowiązkami."
  },
  {
    cat: "Rycerze — rola i obowiązki",
    q: "Co to był KODEKS HONOROWY rycerza?",
    opts: [
      "Zbiór przepisów podatkowych obowiązujących rycerzy",
      "Wyobrażenie, że rycerz powinien być prawdomówny, szlachetny i pobożny",
      "Lista obowiązków chłopów wobec rycerza",
      "Zasady organizowania turniejów rycerskich"
    ],
    answer: 1,
    explanation: "Kodeks honorowy nakazywał rycerzowi być <strong>prawdomównym i szlachetnym</strong>. Ponadto rycerz powinien odznaczać się pobożnością, walczyć w obronie wiary chrześcijańskiej oraz otaczać opieką najsłabszych i bezbronnych."
  },
  {
    cat: "Rycerze — rola i obowiązki",
    q: "Jakimi cechami charakteru powinien odznaczać się idealny rycerz?",
    opts: [
      "Chciwością, okrucieństwem i sprytem",
      "Odwagą, zdyscyplinowaniem, siłą fizyczną, odpornością na ból i pobożnością",
      "Mądrością, bogactwem i wykształceniem",
      "Pokorą, ciszą i unikaniem konfliktów"
    ],
    answer: 1,
    explanation: "Idealny rycerz musiał cechować się <strong>odwagą, zdyscyplinowaniem, siłą fizyczną i odpornością na ból i zmęczenie</strong>. Oprócz tego powinien kierować się kodeksem honorowym — być prawdomówny, szlachetny i pobożny oraz ochraniać słabszych."
  },
  {
    cat: "Rycerze — rola i obowiązki",
    q: "Gdzie mieszkali rycerze, gdy nie uczestniczyli w wyprawach wojennych?",
    opts: [
      "W klasztorach pod opieką duchownych",
      "W miastach, jako mieszczanie",
      "W swoich siedziebach — dobrach otrzymanych za wierną służbę od władcy",
      "Na dworze królewskim przez cały rok"
    ],
    answer: 2,
    explanation: "Kiedy rycerz nie uczestniczył w wyprawie wojennej, przebywał zazwyczaj <strong>w swojej siedzibie</strong>. Budował ją w dobrach, które otrzymał za wierną służbę od władcy. Ziemia ta, uprawiana przez chłopów, była głównym źródłem rycerskich dochodów."
  },
  {
    cat: "Rycerze — rola i obowiązki",
    q: "Co było głównym źródłem dochodów rycerzy?",
    opts: [
      "Udział w turniejach i zdobywanie nagród",
      "Handel z miastami",
      "Ziemia w ich dobrach, uprawiana przez chłopów",
      "Żołd płacony przez króla"
    ],
    answer: 2,
    explanation: "<strong>Ziemia</strong> uprawiana przez zamieszkałych w dobrach rycerskich chłopów była głównym źródłem dochodów rycerzy. Rycerze otrzymywali te dobra od władcy za wierną służbę zbrojną."
  },
  {
    cat: "Rycerze — rola i obowiązki",
    q: "Jak wyglądała siedziba najbogatszych rycerzy?",
    opts: [
      "Drewniana chata na skraju lasu",
      "Zamek — budowla pełniąca funkcję mieszkalną i obronną",
      "Dom w centrum miasta",
      "Skromny klasztor"
    ],
    answer: 1,
    explanation: "Najbogatsi rycerze mieszkali w <strong>zamkach</strong>. Były to budowle, które pełniły zarówno funkcję mieszkalną, jak i obronną. Zamek był symbolem bogactwa i prestiżu rycerza."
  },
  {
    cat: "Rycerze — rola i obowiązki",
    q: "Kto był najsławniejszym polskim rycerzem według podręcznika?",
    opts: [
      "Roland",
      "William Marshal",
      "Zawisza Czarny z Garbowa",
      "Roger de Gauga"
    ],
    answer: 2,
    explanation: "Wśród polskich rycerzy największą sławą cieszy się do dziś <strong>Zawisza Czarny z Garbowa</strong>. Był on wzorem rycerskiego honoru i odwagi. Hasło polskiego harcerstwa nawiązuje właśnie do jego postaci."
  },

  // ══════════════════════════════════════
  // BLOK 2: DROGA OD PAZIA DO RYCERZA
  // ══════════════════════════════════════
  {
    cat: "Droga od pazia do rycerza",
    q: "W jakim wieku chłopiec z rycerskiego rodu zaczynał służbę jako PAŹ?",
    opts: ["Od 3. roku życia", "Od 7. roku życia", "Od 10. roku życia", "Od 14. roku życia"],
    answer: 1,
    explanation: "Od <strong>7. roku życia</strong> chłopiec, który miał w przyszłości zostać rycerzem, służył jako paź. Na dworze królewskim lub rycerskim uczył się zasad dobrego wychowania i pełnił funkcję służącego."
  },
  {
    cat: "Droga od pazia do rycerza",
    q: "Czego uczył się PAŹ na dworze?",
    opts: [
      "Walki mieczem i posługiwania się kuszą",
      "Zasad dobrego wychowania, pełniąc funkcję służącego",
      "Pisania i czytania po łacinie",
      "Handlu i rachunkowości"
    ],
    answer: 1,
    explanation: "Paź na dworze królewskim lub rycerskim <strong>uczył się zasad dobrego wychowania</strong> i pełnił przy tym jednocześnie funkcję służącego. Był to pierwszy etap długiej drogi do stanu rycerskiego."
  },
  {
    cat: "Droga od pazia do rycerza",
    q: "Mniej więcej w jakim wieku kandydat na rycerza zostawał GIERMKIEM?",
    opts: ["Około 7. roku życia", "Około 10. roku życia", "Około 14. roku życia", "Około 21. roku życia"],
    answer: 2,
    explanation: "Około <strong>14. roku życia</strong> kandydat na rycerza mógł zostać giermkiem. Odbywało się to pod okiem doświadczonego rycerza, przy którym giermek uczył się sztuki walki."
  },
  {
    cat: "Droga od pazia do rycerza",
    q: "Czego uczył się giermek pod okiem doświadczonego rycerza?",
    opts: [
      "Tylko jazdy konnej",
      "Sztuki walki różnym rodzajem broni: kopią, mieczem, toporem, łukiem i kuszą",
      "Wyłącznie modlitwy i liturgii",
      "Zarządzania majątkiem i pobierania danin"
    ],
    answer: 1,
    explanation: "Giermek uczył się <strong>sztuki walki różnym rodzajem broni</strong>: kopią, mieczem i toporem, oraz posługiwania się łukiem i kuszą. Towarzyszył rycerzowi w wyprawach wojennych i był odpowiedzialny za utrzymanie w gotowości broni, zbroi i konia bojowego."
  },
  {
    cat: "Droga od pazia do rycerza",
    q: "Za co był odpowiedzialny giermek podczas wypraw wojennych?",
    opts: [
      "Za gotowanie posiłków dla całego oddziału",
      "Za utrzymanie w gotowości rynsztunku — broni, zbroi i konia bojowego",
      "Za negocjacje z wrogiem",
      "Za opiekę nad rannymi żołnierzami"
    ],
    answer: 1,
    explanation: "Giermek towarzyszył rycerzowi w wyprawach wojennych i był odpowiedzialny za <strong>utrzymanie w gotowości całego rynsztunku</strong>, czyli broni i zbroi, oraz konia bojowego. Podczas bitwy towarzyszył rycerzowi w walce."
  },
  {
    cat: "Droga od pazia do rycerza",
    q: "Jak nazywała się ceremonia, podczas której giermek stawał się rycerzem?",
    opts: ["Hołd lenny", "Koronacja", "Pasowanie na rycerza", "Zaprzysiężenie"],
    answer: 2,
    explanation: "<strong>Pasowanie na rycerza</strong> to uroczysta ceremonia, podczas której giermek — po długiej służbie i wykazaniu się wiernością i odwagą — stawał się pełnoprawnym rycerzem. Nazwa pochodzi od pasa z mieczem, który był głównym symbolem pasowania."
  },
  {
    cat: "Droga od pazia do rycerza",
    q: "Co giermek robił w noc poprzedzającą ceremonię pasowania?",
    opts: [
      "Trenował walkę na miecze",
      "Ucztował z innymi rycerzami",
      "Spędzał noc na modlitwie w kościele",
      "Uczył się tekstu przysięgi rycerskiej"
    ],
    answer: 2,
    explanation: "Noc poprzedzającą pasowanie młodzieniec <strong>spędzał na modlitwie w kościele</strong>. Był to czas skupienia i przygotowania duchowego do przyjęcia stanu rycerskiego. Ceremonię następnego dnia rozpoczynała msza."
  },
  {

let current = 0;
let score = 0;
let answered = false;
let shuffled = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function init() {
  shuffled = shuffle(questions);
  current = 0; score = 0; answered = false;
}

function render() {
  const q = shuffled[current];
  const pct = (current / shuffled.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Pytanie ${current + 1} z ${shuffled.length}`;

  const letters = ['A', 'B', 'C', 'D'];
  const optsHTML = q.opts.map((opt, i) => `
    <button class="option-btn" id="opt${i}" onclick="choose(${i})">
      <span class="option-letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>
  `).join('');

  document.getElementById('quizArea').innerHTML = `
    <div class="question-card">
      <div class="q-category">${q.cat}</div>
      <div class="q-number">Pytanie ${current + 1} z ${shuffled.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHTML}</div>
      <div class="feedback" id="feedback"></div>
      <div class="clearfix">
        <button class="next-btn" id="nextBtn" onclick="next()">
          ${current < shuffled.length - 1 ? 'Następne pytanie →' : 'Zobacz wynik 🏆'}
        </button>
      </div>
    </div>
  `;
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  const q = shuffled[current];
  const fb = document.getElementById('feedback');
  const allBtns = document.querySelectorAll('.option-btn');
  const correct = Array.isArray(q.answer) ? q.answer : [q.answer];
  allBtns.forEach(b => b.disabled = true);

  if (correct.includes(i)) {
    score++;
    document.getElementById(`opt${i}`).classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `<div class="feedback-header">✓ Poprawna odpowiedź!</div><div class="feedback-body">${q.explanation}</div>`;
  } else {
    document.getElementById(`opt${i}`).classList.add('wrong');
    correct.forEach(a => document.getElementById(`opt${a}`).classList.add('correct'));
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `<div class="feedback-header">✗ Błędna odpowiedź</div><div class="feedback-body">${q.explanation}</div>`;
  }
  document.getElementById('nextBtn').classList.add('show');
}

function next() {
  current++;
  if (current >= shuffled.length) showScore();
  else render();
}

function showScore() {
  document.getElementById('quizArea').innerHTML = '';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressText').textContent = 'Ukończono!';

  const pct = score / shuffled.length;
  let icon, stars, msg;
  if (pct === 1) {
    icon = '🏆'; stars = '⭐⭐⭐⭐⭐';
    msg = 'Doskonale! Jesteś prawdziwym mistrzem wiedzy o epoce rycerzy. Godny pasowania na rycerza!';
  } else if (pct >= 0.8) {
    icon = '🛡'; stars = '⭐⭐⭐⭐';
    msg = 'Bardzo dobry wynik! Twoja wiedza o rycerzach jest imponująca. Niestraszne Ci kopie ani miecze wiedzy!';
  } else if (pct >= 0.6) {
    icon = '⚔'; stars = '⭐⭐⭐';
    msg = 'Nieźle! Znasz podstawy epoki rycerzy. Warto jednak powtórzyć materiał, by stać się prawdziwym giermkiem wiedzy.';
  } else if (pct >= 0.4) {
    icon = '🐴'; stars = '⭐⭐';
    msg = 'Masz jeszcze sporo do nauki. Nie poddawaj się — każdy wielki rycerz zaczynał jako szeregowy paź!';
  } else {
    icon = '📜'; stars = '⭐';
    msg = 'Czas wrócić do lektury! Przeczytaj uważnie materiał o epoce rycerzy i spróbuj ponownie.';
  }

  document.getElementById('scoreIcon').textContent = icon;
  document.getElementById('scoreStars').textContent = stars;
  document.getElementById('scoreNum').textContent = `${score} / ${shuffled.length}`;
  document.getElementById('scoreMsg').textContent = msg;
  document.getElementById('scoreScreen').classList.add('show');
}

function restart() {
  document.getElementById('scoreScreen').classList.remove('show');
  document.getElementById('progressBar').style.width = '0%';
  init();
  render();
}

init();
render();
</script>
